# XcodeGen source-of-truth for the macRo Mac app.
# Regenerate the .xcodeproj after editing this file:
#
#   cd App && xcodegen generate
#
# The generated macRo.xcodeproj/ is gitignored. This file is the source of truth.

name: macRo
options:
  bundleIdPrefix: com.626labs
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  developmentLanguage: en

# Swift Package Manager dependencies. Yams powers MacroBundle's YAML
# load/save against the Codable types in App/macRo/Schema/MacroFormat.swift.
# Pinned major-minor; minor bumps land via a logged decision.
packages:
  Yams:
    url: https://github.com/jpsim/Yams.git
    from: "5.1.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ARCHS: "arm64 x86_64"
    # Hardened Runtime is for notarized production builds. Debug builds
    # turn it off (see configs.Debug below) so dev iteration doesn't fight
    # strict enforcement that's only meaningful at release time.
    ENABLE_HARDENED_RUNTIME: YES
    CLANG_ENABLE_MODULES: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    DEAD_CODE_STRIPPING: YES
    # Manual signing with the Developer ID Application cert — works for both
    # dev (cmd+R) and release (notarized DMG). Developer ID is the only cert
    # available locally (no Mac Development cert installed); since it's
    # stable across rebuilds, macOS TCC sees one app forever — no Screen
    # Recording / Accessibility re-prompts on every cmd+R, which was the
    # ad-hoc-signing trap that bit us at item 5/6.
    # Note: Developer ID-signed apps run outside the Mac App Store without a
    # provisioning profile; Xcode warns but the binary is valid.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application"
    DEVELOPMENT_TEAM: "82BSR56X5J"
    PROVISIONING_PROFILE_SPECIFIER: ""
  configs:
    # Debug builds host-only — keeps SPM dependency builds (e.g., Yams)
    # tractable on Intel hosts where Universal SwiftPM rebuilds choke.
    # Release stays Universal so the notarized DMG lands as a fat binary.
    Debug:
      ONLY_ACTIVE_ARCH: YES
      # Hardened Runtime is overkill for dev iteration and was empirically
      # blocking mouse-event delivery to the wizard's interactive elements
      # (Continue button unresponsive at item-3 visual verification, 2026-05-05).
      # Release builds re-enable it via the base setting; notarization in
      # item 11 requires Hardened Runtime by definition.
      ENABLE_HARDENED_RUNTIME: NO
    Release:
      ONLY_ACTIVE_ARCH: NO

targets:
  macRo:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: macRo
        excludes:
          - "Info.plist"
          - "macRo.entitlements"
      # `games/` ships as a folder reference into the app bundle so
      # `PluginLoader.shared.bundledPluginsRootURL` resolves at runtime
      # (item 10a → `Bundle.main.resourceURL/games/`). Folder reference
      # preserves the on-disk tree (plugin.yaml + seed-macros/<id>.macro/...)
      # without flattening per-bundle resources into the app's flat
      # resources directory — same reason macRoTests excludes `Fixtures`.
      - path: ../games
        type: folder
        buildPhase: resources
    dependencies:
      - package: Yams
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.626labs.macRo
        PRODUCT_NAME: macRo
        MARKETING_VERSION: "0.0.1"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: macRo/Info.plist
        CODE_SIGN_ENTITLEMENTS: macRo/macRo.entitlements
        ENABLE_APP_SANDBOX: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        SWIFT_EMIT_LOC_STRINGS: YES

  macRoTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: macRoTests
        excludes:
          # Test fixtures are loaded by `#filePath`-relative URLs at
          # runtime (see MacroBundleTests.fixtureURL + EngineTests
          # item-6 fixture-smoke tests). Including them in the test
          # bundle's resources flattens manifest.yaml / timeline.yaml
          # across multiple .macro folders, causing
          # "Multiple commands produce" build errors. The repo path is
          # the canonical source; xcodebuild test resolves it from
          # `#filePath` regardless of bundle resource layout.
          - "Fixtures"
    dependencies:
      - target: macRo
      - package: Yams
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.626labs.macRoTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/macRo.app/Contents/MacOS/macRo"

schemes:
  macRo:
    build:
      targets:
        macRo: all
        macRoTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - macRoTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
